##############################################################################
# AegisOS — Docker Compose (Development)
# The Autonomous AI Operating System for Financial Intelligence
##############################################################################

services:
  # ─────────────────────────── API Gateway ───────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: aegis-api
    ports:
      - "8000:8000"
    environment:
      - AEGIS_DATABASE_URL=postgresql+asyncpg://aegis:aegis_secret@postgres:5432/aegisdb
      - AEGIS_REDIS_URL=redis://redis:6379/0
      - AEGIS_NEO4J_URI=bolt://neo4j:7687
      - AEGIS_NEO4J_USER=neo4j
      - AEGIS_NEO4J_PASSWORD=aegis_neo4j
      - AEGIS_QDRANT_URL=http://qdrant:6333
      - AEGIS_SECURITY_SECRET_KEY=aegis-dev-secret-key-change-in-production
      - AEGIS_ENVIRONMENT=development
      - AEGIS_LOG_LEVEL=INFO
    volumes:
      - .:/app
      - model-data:/app/model_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────── Workers ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: aegis-worker
    environment:
      - AEGIS_DATABASE_URL=postgresql+asyncpg://aegis:aegis_secret@postgres:5432/aegisdb
      - AEGIS_REDIS_URL=redis://redis:6379/0
      - AEGIS_NEO4J_URI=bolt://neo4j:7687
      - AEGIS_NEO4J_USER=neo4j
      - AEGIS_NEO4J_PASSWORD=aegis_neo4j
      - AEGIS_QDRANT_URL=http://qdrant:6333
      - AEGIS_SECURITY_SECRET_KEY=aegis-dev-secret-key-change-in-production
    volumes:
      - .:/app
      - model-data:/app/model_artifacts
    depends_on:
      - api
      - redis
    networks:
      - aegis-network
    restart: unless-stopped

  # ─────────────────────────── Dashboard ───────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: aegis-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - api
    networks:
      - aegis-network
    restart: unless-stopped

  # ─────────────────────────── PostgreSQL ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aegisdb
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────── Neo4j ───────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: aegis-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/aegis_neo4j
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────── Redis ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────── Qdrant ───────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ─────────────────────────── MinIO ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aegis-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: aegis_minio
      MINIO_ROOT_PASSWORD: aegis_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - aegis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 3

# ─────────────────────────── Volumes ───────────────────────────
volumes:
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  minio-data:
    driver: local
  model-data:
    driver: local

# ─────────────────────────── Networks ───────────────────────────
networks:
  aegis-network:
    driver: bridge
    name: aegis-network
