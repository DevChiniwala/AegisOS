<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="40%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="hero-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#hero-bg)"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="150" r="200" fill="url(#orb1)"/>
  <circle cx="1050" cy="100" r="250" fill="url(#orb2)"/>

  <!-- Network nodes (decorative) -->
  <circle cx="80" cy="60" r="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="150" cy="40" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="200" cy="80" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="120" cy="100" r="2.5" fill="#ec4899" opacity="0.4"/>
  <line x1="80" y1="60" x2="150" y2="40" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="40" x2="200" y2="80" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="60" x2="120" y2="100" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="80" x2="120" y2="100" stroke="#ec4899" stroke-width="0.5" opacity="0.2"/>

  <circle cx="1000" cy="50" r="3" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="1070" cy="30" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="1120" cy="70" r="3.5" fill="#ec4899" opacity="0.3"/>
  <circle cx="1050" cy="90" r="2" fill="#3b82f6" opacity="0.4"/>
  <line x1="1000" y1="50" x2="1070" y2="30" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="1070" y1="30" x2="1120" y2="70" stroke="#ec4899" stroke-width="0.5" opacity="0.3"/>
  <line x1="1000" y1="50" x2="1050" y2="90" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

  <!-- Right side network cluster -->
  <circle cx="1050" cy="220" r="2.5" fill="#10b981" opacity="0.5"/>
  <circle cx="1100" cy="200" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="1130" cy="240" r="2" fill="#ef4444" opacity="0.3"/>
  <circle cx="1080" cy="260" r="3" fill="#3b82f6" opacity="0.4"/>
  <line x1="1050" y1="220" x2="1100" y2="200" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
  <line x1="1100" y1="200" x2="1130" y2="240" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
  <line x1="1130" y1="240" x2="1080" y2="260" stroke="#ef4444" stroke-width="0.5" opacity="0.2"/>
  <line x1="1050" y1="220" x2="1080" y2="260" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

  <!-- Shield logo -->
  <g transform="translate(490, 70)">
    <path d="M 50 5 L 95 20 L 95 55 C 95 80 75 100 50 110 C 25 100 5 80 5 55 L 5 20 Z" fill="url(#shield-grad)" opacity="0.9" filter="url(#hero-glow)"/>
    <path d="M 50 20 L 80 30 L 80 55 C 80 72 65 85 50 92 C 35 85 20 72 20 55 L 20 30 Z" fill="#0a0e1a"/>
    <text x="50" y="68" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#60a5fa" text-anchor="middle">A</text>
  </g>

  <!-- Title -->
  <text x="600" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="#f8fafc" text-anchor="middle" letter-spacing="-1">AegisOS</text>

  <!-- Gradient underline -->
  <rect x="420" y="145" width="360" height="3" rx="1.5" fill="url(#hero-accent)"/>

  <!-- Tagline -->
  <text x="600" y="180" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">The Autonomous AI Operating System for Financial Intelligence</text>

  <!-- Stats bar -->
  <rect x="250" y="210" width="700" height="50" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="340" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle">9</text>
  <text x="340" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">AI Agents</text>

  <line x1="415" y1="220" x2="415" y2="250" stroke="#1e293b" stroke-width="1"/>

  <text x="490" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6" text-anchor="middle">5</text>
  <text x="490" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">ML Models</text>

  <line x1="565" y1="220" x2="565" y2="250" stroke="#1e293b" stroke-width="1"/>

  <text x="640" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">&lt;20ms</text>
  <text x="640" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Rule Latency</text>

  <line x1="720" y1="220" x2="720" y2="250" stroke="#1e293b" stroke-width="1"/>

  <text x="800" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">60+</text>
  <text x="800" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Features</text>

  <line x1="870" y1="220" x2="870" y2="250" stroke="#1e293b" stroke-width="1"/>

  <text x="900" y="235" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ec4899" text-anchor="middle">100%</text>
  <text x="900" y="250" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Explainable</text>

  <!-- Bottom border accent -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#hero-accent)"/>
</svg>
