<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="df-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <filter id="df-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#df-bg)"/>

  <!-- Title -->
  <text x="600" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#f8fafc" text-anchor="middle">Transaction Scoring Pipeline — Data Flow</text>
  <text x="600" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">From ingestion to verdict in &lt;50ms (Fast Path) or &lt;5s (Full Investigation)</text>

  <!-- ═══════ STEP 1: INGESTION ═══════ -->
  <rect x="30" y="80" width="150" height="110" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle">1. INGEST</text>
  <text x="105" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Transaction arrives</text>
  <text x="105" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">via REST/Kafka</text>
  <rect x="50" y="152" width="110" height="20" rx="4" fill="#1e3a5f"/>
  <text x="105" y="166" font-family="monospace" font-size="8" fill="#93c5fd" text-anchor="middle">validate + enrich</text>

  <!-- Arrow 1->2 -->
  <line x1="180" y1="135" x2="220" y2="135" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════ STEP 2: FEATURE EXTRACTION ═══════ -->
  <rect x="225" y="80" width="170" height="110" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <text x="310" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#67e8f9" text-anchor="middle">2. EXTRACT</text>
  <text x="310" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">60+ features computed</text>
  <text x="310" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">in parallel extractors</text>
  <rect x="240" y="152" width="50" height="18" rx="3" fill="#164e63"/>
  <text x="265" y="164" font-family="system-ui, sans-serif" font-size="7" fill="#67e8f9" text-anchor="middle">Tx</text>
  <rect x="295" y="152" width="50" height="18" rx="3" fill="#164e63"/>
  <text x="320" y="164" font-family="system-ui, sans-serif" font-size="7" fill="#67e8f9" text-anchor="middle">Device</text>
  <rect x="350" y="152" width="40" height="18" rx="3" fill="#164e63"/>
  <text x="370" y="164" font-family="system-ui, sans-serif" font-size="7" fill="#67e8f9" text-anchor="middle">Graph</text>

  <!-- Arrow 2->3 -->
  <line x1="395" y1="135" x2="435" y2="135" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════ STEP 3: FAST PATH RULES ═══════ -->
  <rect x="440" y="80" width="160" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fcd34d" text-anchor="middle">3. FAST PATH</text>
  <text x="520" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">YAML rule engine</text>
  <text x="520" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">10 pre-configured rules</text>
  <rect x="460" y="152" width="120" height="20" rx="4" fill="#422006"/>
  <text x="520" y="166" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">&lt;5ms evaluation</text>

  <!-- Decision diamond -->
  <polygon points="640,135 670,110 700,135 670,160" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="670" y="138" font-family="system-ui, sans-serif" font-size="8" fill="#fcd34d" text-anchor="middle">HIT?</text>

  <!-- Arrow to BLOCK (fast exit) -->
  <line x1="670" y1="110" x2="670" y2="78" stroke="#f87171" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="635" y="50" width="70" height="25" rx="6" fill="#7f1d1d" stroke="#f87171" stroke-width="1"/>
  <text x="670" y="67" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fca5a5" text-anchor="middle">BLOCK</text>

  <!-- Arrow to ML (no hit) -->
  <line x1="700" y1="135" x2="740" y2="135" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="720" y="128" font-family="system-ui, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">NO</text>

  <!-- ═══════ STEP 4: ML ENSEMBLE ═══════ -->
  <rect x="745" y="80" width="180" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="835" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fca5a5" text-anchor="middle">4. ML ENSEMBLE</text>
  <text x="835" y="125" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">SHAP-weighted voting</text>
  <text x="835" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">4 models + calibration</text>
  <rect x="760" y="153" width="150" height="18" rx="3" fill="#450a0a"/>
  <text x="835" y="165" font-family="monospace" font-size="7" fill="#fca5a5" text-anchor="middle">score = Σ(w_i × p_i) → σ(a·s+b)</text>

  <!-- Arrow 4->5 -->
  <line x1="925" y1="135" x2="960" y2="135" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ═══════ STEP 5: VERDICT ═══════ -->
  <rect x="965" y="80" width="200" height="110" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="1065" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6ee7b7" text-anchor="middle">5. VERDICT</text>
  <rect x="980" y="115" width="55" height="20" rx="4" fill="#064e3b"/>
  <text x="1007" y="129" font-family="system-ui, sans-serif" font-size="8" fill="#6ee7b7" text-anchor="middle">ALLOW</text>
  <rect x="1042" y="115" width="45" height="20" rx="4" fill="#422006"/>
  <text x="1064" y="129" font-family="system-ui, sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle">FLAG</text>
  <rect x="1094" y="115" width="55" height="20" rx="4" fill="#450a0a"/>
  <text x="1121" y="129" font-family="system-ui, sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle">BLOCK</text>
  <text x="1065" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">+ SHAP explanation</text>
  <text x="1065" y="172" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">+ risk level + reasons</text>

  <!-- ═══════ INVESTIGATION PATH (for FLAG/BLOCK) ═══════ -->
  <text x="600" y="225" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f472b6" text-anchor="middle">— Investigation Path (Triggered for score &gt; 0.7) —</text>

  <!-- Step 6: Agent Orchestration -->
  <rect x="60" y="250" width="250" height="130" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="185" y="275" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#f9a8d4" text-anchor="middle">6. AGENT ORCHESTRATION</text>
  <text x="185" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Supervisor dispatches 9 agents</text>
  <!-- Agent flow -->
  <rect x="75" y="308" width="90" height="18" rx="3" fill="#831843"/>
  <text x="120" y="320" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Tx Investigator</text>
  <rect x="172" y="308" width="90" height="18" rx="3" fill="#831843"/>
  <text x="217" y="320" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Graph Detective</text>
  <rect x="75" y="332" width="90" height="18" rx="3" fill="#831843"/>
  <text x="120" y="344" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Behavior Analyst</text>
  <rect x="172" y="332" width="90" height="18" rx="3" fill="#831843"/>
  <text x="217" y="344" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Evidence Collector</text>
  <rect x="75" y="356" width="90" height="18" rx="3" fill="#831843"/>
  <text x="120" y="368" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Risk Assessor</text>
  <rect x="172" y="356" width="90" height="18" rx="3" fill="#831843"/>
  <text x="217" y="368" font-family="system-ui, sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Compliance Off.</text>

  <!-- Arrow 6->7 -->
  <line x1="310" y1="315" x2="360" y2="315" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 7: Evidence Compilation -->
  <rect x="365" y="250" width="230" height="130" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="480" y="275" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c4b5fd" text-anchor="middle">7. EVIDENCE COMPILATION</text>
  <text x="480" y="298" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Findings aggregated from all agents</text>
  <text x="480" y="318" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Graph subgraph extracted</text>
  <text x="480" y="338" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Similar cases retrieved from memory</text>
  <text x="480" y="358" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Confidence scores computed</text>
  <text x="480" y="375" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">Decision Agent renders final verdict</text>

  <!-- Arrow 7->8 -->
  <line x1="595" y1="315" x2="645" y2="315" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 8: Output -->
  <rect x="650" y="250" width="230" height="130" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="765" y="275" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6ee7b7" text-anchor="middle">8. CASE OUTPUT</text>
  <text x="765" y="298" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Investigation Case created</text>
  <text x="765" y="318" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Timeline of agent actions</text>
  <text x="765" y="338" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Evidence chain + audit trail</text>
  <text x="765" y="358" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">SAR auto-generated if needed</text>
  <text x="765" y="375" font-family="monospace" font-size="8" fill="#10b981" text-anchor="middle">Stored → Dashboard → Alerts</text>

  <!-- Step 9: Compliance -->
  <rect x="910" y="250" width="250" height="130" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="1035" y="275" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fcd34d" text-anchor="middle">9. COMPLIANCE ACTIONS</text>
  <text x="1035" y="298" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">AML screening (OFAC, PEP)</text>
  <text x="1035" y="318" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">CTR filing for &gt;$10,000</text>
  <text x="1035" y="338" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">SAR generation (FinCEN)</text>
  <text x="1035" y="358" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">KYC/PSD2/GDPR checks</text>
  <text x="1035" y="375" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">Regulatory-ready output</text>

  <!-- Arrow 8->9 -->
  <line x1="880" y1="315" x2="910" y2="315" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- ═══════ LATENCY INDICATORS ═══════ -->
  <rect x="60" y="420" width="1080" height="60" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="600" y="442" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f8fafc" text-anchor="middle">End-to-End Latency</text>

  <!-- Fast path bar -->
  <rect x="100" y="452" width="200" height="16" rx="4" fill="#064e3b"/>
  <text x="200" y="464" font-family="monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">Fast Path: &lt;20ms</text>

  <!-- ML path bar -->
  <rect x="320" y="452" width="300" height="16" rx="4" fill="#422006"/>
  <text x="470" y="464" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">ML Scoring: &lt;50ms</text>

  <!-- Full investigation bar -->
  <rect x="640" y="452" width="480" height="16" rx="4" fill="#4c1d95"/>
  <text x="880" y="464" font-family="monospace" font-size="9" fill="#c4b5fd" text-anchor="middle">Full Investigation (9 agents): &lt;5 seconds</text>

  <!-- ═══════ LEGEND ═══════ -->
  <text x="60" y="520" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Event Flow</text>
  <rect x="60" y="530" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="80" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Ingestion &amp; Processing</text>
  <rect x="200" y="530" width="12" height="12" rx="2" fill="#06b6d4"/>
  <text x="220" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Feature Computation</text>
  <rect x="360" y="530" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="380" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Rule Evaluation</text>
  <rect x="500" y="530" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="520" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">ML Scoring</text>
  <rect x="620" y="530" width="12" height="12" rx="2" fill="#ec4899"/>
  <text x="640" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Agent Investigation</text>
  <rect x="790" y="530" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="810" y="540" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Output &amp; Verdict</text>

  <!-- Footer -->
  <text x="600" y="580" font-family="system-ui, sans-serif" font-size="9" fill="#475569" text-anchor="middle">Transactions scoring below 0.3 are auto-allowed. Scores 0.3-0.7 are flagged for review. Scores above 0.7 trigger full autonomous investigation.</text>
</svg>
