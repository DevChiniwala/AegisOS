name: AegisOS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "."
        pip install pytest ruff networkx python-louvain pyyaml numpy

    - name: Linting (ruff)
      run: |
        ruff check . --select E,F --ignore E501 || true

    - name: Run unit tests
      run: |
        pytest tests/unit -v

  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build API image
      run: docker build -t aegisos/api:latest -f infrastructure/docker/Dockerfile.api .
      
    - name: Build Worker image
      run: docker build -t aegisos/worker:latest -f infrastructure/docker/Dockerfile.worker .
